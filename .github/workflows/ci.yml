name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install -U pytest pytest-cov
          # 可选：静态检查
          pip install -U flake8 black

      - name: Lint (flake8)
        run: |
          flake8 momo_ml

      - name: Run tests
        run: |
          pytest --maxfail=1 --disable-warnings -q --cov=momo_ml --cov-report=term-missing

      - name: Build package
        run: |
          python -m pip install build
          python -m build
