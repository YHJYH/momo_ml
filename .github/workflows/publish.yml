name: Publish to PyPI

on:
  push:
    tags:
      - "v*"           # 例如 v0.1.0

permissions:
  id-token: write      # 必须：为 OIDC / Trusted Publishing 授权
  contents: read

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build
        run: |
          python -m pip install --upgrade pip
          python -m pip install build

      - name: Build package
        run: python -m build

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@v1.8.10
        with:
          # repository-url 不需要；默认就是 https://upload.pypi.org/legacy/
          # 如果要先发布 TestPyPI，改用下方注释的配置
          # repository-url: https://test.pypi.org/legacy/
          skip-existing: true
